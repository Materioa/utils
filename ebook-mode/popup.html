<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 340px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: #333;
    }
    .font-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 4px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #333;
    }
    label:hover {
      color: #2563eb;
    }
    input[type="radio"] {
      cursor: pointer;
    }
    button {
      padding: 10px;
      border: none;
      border-radius: 4px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }
    button:hover {
      background: #1d4ed8;
    }
    button:active {
      opacity: 0.9;
    }
    .info {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div>
      <h3>📚 Font Style</h3>
      <div class="font-options">
        <label>
          <input type="radio" name="fontStyle" value="option1" checked>
          Playfair + Lora
        </label>
        <label>
          <input type="radio" name="fontStyle" value="option2">
          Source Serif Pro
        </label>
        <label>
          <input type="radio" name="fontStyle" value="option3">
          IBM Plex + Lora
        </label>
        <label>
          <input type="radio" name="fontStyle" value="option4">
          EB Garamond
        </label>
        <label>
          <input type="radio" name="fontStyle" value="option5">
          Inter + Lora
        </label>
      </div>
    </div>
    
    <button id="ebookBtn">📖 Open in Ebook Mode</button>
    <p class="info">Converts web content to a clean, print-friendly ebook view.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
